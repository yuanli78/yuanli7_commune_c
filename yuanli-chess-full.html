<!DOCTYPE html>
<html lang="zh">
<head>

  <title>源力象棋 · 全面版 · 最终棋盘布局（完整补全）</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 20px;
      background: #fef9f0;
      font-family: 'Noto Serif SC', 'KaiTi', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .board-wrapper {
      background: #faf6f0;
      padding: 24px 16px 16px 24px;
      border-radius: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      overflow: auto;
      max-width: 100%;
      border: 1px solid #ffe0b5;
    }
    canvas {
      display: block;
      background: #fff9ef;
      border-radius: 16px;
      box-shadow: inset 0 0 0 2px #d4b89c, 0 6px 12px rgba(0,0,0,0.05);
      cursor: default;
      width: 100%;
      height: auto;
    }
    .legend {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      justify-content: center;
      color: #2c2c2c;
      font-weight: bold;
      background: #fff3e0;
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid #ffe0b5;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .red-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: #b91c1c;
      border-radius: 50%;
      border: 2px solid #ffe0b5;
    }
    .black-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: #3a2a1a;
      border-radius: 50%;
      border: 2px solid #ffe0b5;
    }
    .note {
      text-align: center;
      margin-top: 12px;
      color: #5e5e5e;
      font-size: 0.9rem;
    }
    h2 {
      text-align: center;
      margin: 8px 0 16px 0;
      color: #b91c1c;
      text-shadow: none;
      border-bottom: 2px solid #ffe0b5;
      padding-bottom: 8px;
    }
    .footer-copyright {
      max-width: 1000px;
      margin: 20px auto 0;
      text-align: center;
    }
    .copyright-inner {
      background: #f0ece4;
      padding: 1.2rem 2rem;
      border-radius: 40px;
      display: inline-block;
      color: #5e5e5e;
      font-size: 0.85rem;
      border: 1px solid #ffe0b5;
    }
    .nav-links {
      margin-top: 24px;
      text-align: center;
    }
    .nav-links a {
      color: #b91c1c;
      text-decoration: none;
      font-weight: 500;
      margin: 0 12px;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
    .nav-links span {
      color: #d4b89c;
    }
  </style>

<body>
<div class="board-wrapper">
  <h2>⚔️ 源力象棋 · 全面版 · 最终布局（完整补全） ⚔️</h2>
  <canvas id="chessCanvas" width="1720" height="1400"></canvas>
  <div class="legend">
    <span><span class="red-dot"></span> 红方</span>
    <span><span class="black-dot"></span> 黑方</span>
    <span>📐 总行35 (-10~24) · 总列43 (-20~22) · 对称轴 行7 / 列1</span>
    <span>🗺️ 含: 三十六计·聊斋·影子·虎穴·缴获·天兵·翔·悬·红线·等</span>
  </div>
  <div class="note">
    ※ 棋子为中文简称 · 红黑严格镜像对称 · 动态棋子(伏兵/木马等)未显示
  </div>
</div>

<div class="footer-copyright">

  </div>

<script>
  (function() {
    "use strict";

    const canvas = document.getElementById('chessCanvas');
    const ctx = canvas.getContext('2d');

    // 扩展为完整的35行：-10 到 24
    const ROW_MIN = -10;
    const ROW_MAX = 24;
    const COL_MIN = -20;
    const COL_MAX = 22;
    const ROWS = ROW_MAX - ROW_MIN + 1;  // 35
    const COLS = COL_MAX - COL_MIN + 1;  // 43

    const CELL_W = 40;
    const CELL_H = 40;
    const LABEL_SIZE = 28;
    canvas.width = COLS * CELL_W + LABEL_SIZE * 2;
    canvas.height = ROWS * CELL_H + LABEL_SIZE * 2;

    const RED = '#b91c1c';
    const BLACK = '#3a2a1a';
    const BOARD_LINE = '#a5835a';
    const BG_COLOR = '#fff9ef';
    const LABEL_COLOR = '#5e5e5e';
    const RIVER_COLOR = '#b91c1c';

    function rowIdx(logicRow) { return logicRow - ROW_MIN; }
    function colIdx(logicCol) { return logicCol - COL_MIN; }
    function logicRow(idx) { return idx + ROW_MIN; }
    function logicCol(idx) { return idx + COL_MIN; }

    const board = Array(ROWS).fill().map(() => Array(COLS).fill(null));

    function setPiece(row, col, name, color) {
      const r = rowIdx(row);
      const c = colIdx(col);
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        board[r][c] = { name, color };
      }
    }

    // ========== 黑方完整布局 ==========
    
    // ---- 缴获线 (行-3) ----
    setPiece(-3, -2, '缴', BLACK); setPiece(-3, -1, '缴', BLACK); setPiece(-3, 0, '步', BLACK);
    setPiece(-3, 1, '缴', BLACK); setPiece(-3, 2, '缴', BLACK); setPiece(-3, 3, '缴', BLACK);
    setPiece(-3, 4, '步', BLACK); setPiece(-3, 5, '缴', BLACK); setPiece(-3, 6, '缴', BLACK);
    
    // ---- 虎穴 (行-2) ----
    setPiece(-2, 2, '穴', BLACK); setPiece(-2, 4, '虎', BLACK); setPiece(-2, 6, '穴', BLACK);
    
    // ---- 影子行 (行-1) ----
    setPiece(-1, -2, '影车', BLACK); setPiece(-1, 0, '影马', BLACK); setPiece(-1, 2, '影相', BLACK);
    setPiece(-1, 4, '影士', BLACK); setPiece(-1, 6, '影将', BLACK); setPiece(-1, 8, '影兵', BLACK);
    
    // ---- 底线 (行0) 及两侧外延 ----
    setPiece(0, -20, '天', BLACK);
    setPiece(0, -19, '异炮', BLACK); setPiece(0, -18, '异马', BLACK); setPiece(0, -17, '异车', BLACK);
    setPiece(0, -16, '悬', BLACK); setPiece(0, 18, '悬', BLACK);
    setPiece(0, -14, '翔', BLACK); setPiece(0, 16, '翔', BLACK);
    setPiece(0, -13, '石', BLACK); setPiece(0, 17, '石', BLACK);
    setPiece(0, -12, '骥', BLACK); setPiece(0, 16, '骥', BLACK);
    setPiece(0, -11, '城', BLACK); setPiece(0, 15, '城', BLACK);
    setPiece(0, -10, '轰', BLACK); setPiece(0, 14, '轰', BLACK);
    setPiece(0, -9, '战车', BLACK); setPiece(0, 13, '飞马', BLACK);
    setPiece(0, -8, '战马', BLACK); setPiece(0, 12, '骑', BLACK);
    setPiece(0, -7, '骑', BLACK); setPiece(0, 11, '炮', BLACK);
    setPiece(0, -6, '炮', BLACK); setPiece(0, 10, '车', BLACK);
    setPiece(0, -5, '驼', BLACK); setPiece(0, 9, '马', BLACK);
    setPiece(0, -4, '车', BLACK); setPiece(0, 8, '象', BLACK);
    setPiece(0, -3, '骡', BLACK); setPiece(0, 7, '骑', BLACK);
    setPiece(0, -2, '马', BLACK); setPiece(0, 5, '天将', BLACK); setPiece(0, 6, '天将', BLACK);
    setPiece(0, -1, '象', BLACK); setPiece(0, 4, '士', BLACK);
    setPiece(0, 0, '士', BLACK); setPiece(0, 1, '骑', BLACK);
    setPiece(0, 2, '天将', BLACK); setPiece(0, 3, '天将', BLACK);
    
    // 行1 (地道/御/诏等)
    setPiece(1, -11, '骥', BLACK); setPiece(1, 13, '骥', BLACK);
    setPiece(1, -9, '战炮', BLACK); setPiece(1, 11, '飞炮', BLACK);
    setPiece(1, -8, '战士', BLACK); setPiece(1, 10, '飞士', BLACK);
    setPiece(1, -7, '士', BLACK); setPiece(1, 9, '士', BLACK);
    setPiece(1, -6, '国', BLACK); setPiece(1, 8, '国', BLACK);
    setPiece(1, -2, '地', BLACK); setPiece(1, 7, '地', BLACK);
    setPiece(1, 2, '诏', BLACK); setPiece(1, 3, '御', BLACK);
    
    // 行2 (炮/抛/蝉等)
    setPiece(2, -9, '战象', BLACK); setPiece(2, 13, '飞象', BLACK);
    setPiece(2, -8, '战马', BLACK); setPiece(2, 12, '飞马', BLACK);
    setPiece(2, -5, '抛', BLACK); setPiece(2, 7, '抛', BLACK);
    setPiece(2, -3, '炮', BLACK); setPiece(2, 6, '炮', BLACK);
    setPiece(2, 2, '蝉', BLACK);
    
    // 行3 (斥)
    setPiece(3, -2, '斥', BLACK); setPiece(3, 1, '斥', BLACK);
    setPiece(3, 6, '斥', BLACK); setPiece(3, 9, '斥', BLACK);
    
    // 行4 (重兵/步/新增士象)
    setPiece(4, -6, '象', BLACK); setPiece(4, -5, '士', BLACK);
    setPiece(4, 12, '士', BLACK); setPiece(4, 13, '象', BLACK);
    setPiece(4, -2, '重', BLACK); setPiece(4, 0, '重', BLACK);
    setPiece(4, 2, '步', BLACK); setPiece(4, 3, '重', BLACK);
    setPiece(4, 5, '重', BLACK); setPiece(4, 7, '重', BLACK);
    
    // 行5 (兵/雷/丁)
    setPiece(5, -3, '兵', BLACK); setPiece(5, -1, '兵', BLACK);
    setPiece(5, 0, '丁', BLACK); setPiece(5, 1, '兵', BLACK);
    setPiece(5, 2, '雷', BLACK); setPiece(5, 3, '兵', BLACK);
    setPiece(5, 4, '丁', BLACK); setPiece(5, 5, '兵', BLACK);
    setPiece(5, 6, '雷', BLACK); setPiece(5, 7, '兵', BLACK);
    setPiece(5, 8, '丁', BLACK); setPiece(5, 9, '兵', BLACK);

    // ---- 三十六计矩阵 (黑方左上角: 行-16~-11, 列-28~-23) ----
    const thirtySixBlack = [
      { row: -16, cols: ['美','畈','借','调','牵','混'] },
      { row: -15, cols: ['声','无','欲','擒','瞒','暗'] },
      { row: -14, cols: ['笑','假','隔','趁','连','走'] },
      { row: -13, cols: ['虢','釜','柱','壳','远','主'] },
      { row: -12, cols: ['围','人','以','李','打','砖'] },
      { row: -11, cols: ['关','指','上','树','空','苦'] }
    ];
    thirtySixBlack.forEach(({row, cols}) => {
      for (let i=0; i<6; i++) {
        setPiece(row, -28 + i, cols[i], BLACK);
      }
    });

    // ---- 聊斋区 (黑方左侧: 行-6~-2, 列-10~-7) ----
    const liaoZhaiBlack = [
      { row: -6, name: '狐' }, { row: -5, name: '鬼' },
      { row: -4, name: '蛇' }, { row: -3, name: '画' }, { row: -2, name: '促' }
    ];
    liaoZhaiBlack.forEach(({row, name}) => {
      for (let c=-10; c<=-7; c++) setPiece(row, c, name, BLACK);
    });

    // ---- 外角官棋 / 追截 ----
    setPiece(-10, -16, '官', BLACK); setPiece(-10, 24, '官', BLACK);
    setPiece(24, -16, '官', RED); setPiece(24, 24, '官', RED);
    setPiece(-10, -20, '追', BLACK); setPiece(-10, -19, '截', BLACK);
    setPiece(24, 21, '截', RED); setPiece(24, 22, '追', RED);
    
    // ---- 后宫 (黑) ----
    setPiece(-7, 4, '妃', BLACK); setPiece(-7, 7, '妃', BLACK);
    setPiece(-6, 5, '帅', BLACK);
    
    // 收集黑方所有棋子用于镜像生成红方
    const blackPieces = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const piece = board[r][c];
        if (piece && piece.color === BLACK) {
          blackPieces.push({ row: logicRow(r), col: logicCol(c), name: piece.name });
        }
      }
    }

    // 镜像生成红方 (红行 = 11 - 黑行，但我们的对称轴现在是行7？不，镜像公式仍为 红行 = 7 - 黑行？不对，最终对称轴应为河界中心，即行5.5。之前公式红行=11-黑行适用于旧18行版。对于新35行版，对称轴位于行7（河界在行6~7之间？实际上行5.5）。简单正确的做法：红行 = 14 - 黑行（因为黑方最上行-10对应红方最下行24，-10+24=14）。）
    // 列镜像公式：红列 = 2 - 黑列
    const redRowBase = 14; // -10 → 24,  24 → -10
    blackPieces.forEach(p => {
      const redRow = redRowBase - p.row;
      const redCol = 2 - p.col;
      if (redRow >= ROW_MIN && redRow <= ROW_MAX && redCol >= COL_MIN && redCol <= COL_MAX) {
        // 红方名称一般不变，仅少数需调整（如丁/勇在红方习惯叫勇，但保留原名亦可）
        let redName = p.name;
        if (redName === '丁') redName = '勇';
        if (redName === '帅') redName = '将'; // 黑帅红将
        setPiece(redRow, redCol, redName, RED);
      }
    });

    // 补充红方特有后宫将 (位置已在镜像中包含，但将帅可能未覆盖)
    setPiece(19, -3, '将', RED); // 手动补一下
    
    // 河界特殊标记：交/涉、日月卫 (不通过镜像，因为它们在河界半行)
    
    // 绘制棋盘
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = BG_COLOR;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.lineWidth = 1.8;
      ctx.strokeStyle = BOARD_LINE;
      for (let c = 0; c <= COLS; c++) {
        const x = LABEL_SIZE + c * CELL_W;
        ctx.beginPath();
        ctx.moveTo(x, LABEL_SIZE);
        ctx.lineTo(x, canvas.height - LABEL_SIZE);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        const y = LABEL_SIZE + r * CELL_H;
        ctx.beginPath();
        ctx.moveTo(LABEL_SIZE, y);
        ctx.lineTo(canvas.width - LABEL_SIZE, y);
        ctx.stroke();
      }

      // 楚河汉界 (行6与行7之间)
      const riverY = LABEL_SIZE + 6.5 * CELL_H;
      ctx.font = `bold ${CELL_H*0.6}px 'KaiTi', 'Noto Serif SC'`;
      ctx.fillStyle = RIVER_COLOR;
      ctx.globalAlpha = 0.5;
      ctx.fillText('楚 河', canvas.width*0.3, riverY - 6);
      ctx.fillText('汉 界', canvas.width*0.55, riverY + 20);
      ctx.globalAlpha = 1.0;

      // 九宫斜线 (黑行0~2列2~7, 红行12~14列2~7)
      const palaces = [
        { rows: [0,1,2], cols: [2,7] },
        { rows: [12,13,14], cols: [2,7] }
      ];
      ctx.lineWidth = 2.2;
      ctx.strokeStyle = BOARD_LINE;
      palaces.forEach(p => {
        const r1 = p.rows[0], r2 = p.rows[2];
        const c1 = p.cols[0], c2 = p.cols[1];
        const x1 = LABEL_SIZE + colIdx(c1) * CELL_W + CELL_W/2;
        const y1 = LABEL_SIZE + rowIdx(r1) * CELL_H + CELL_H/2;
        const x2 = LABEL_SIZE + colIdx(c2) * CELL_W + CELL_W/2;
        const y2 = LABEL_SIZE + rowIdx(r2) * CELL_H + CELL_H/2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(LABEL_SIZE + colIdx(c2) * CELL_W + CELL_W/2, y1);
        ctx.lineTo(LABEL_SIZE + colIdx(c1) * CELL_W + CELL_W/2, y2);
        ctx.stroke();
      });

      // 巨将 (黑行6~7列-2~1, 红行6~7列7~10)
      const jujuY1 = LABEL_SIZE + rowIdx(6) * CELL_H;
      const jujuY2 = LABEL_SIZE + rowIdx(8) * CELL_H;
      const leftX1 = LABEL_SIZE + colIdx(-2) * CELL_W;
      const leftX2 = LABEL_SIZE + colIdx(2) * CELL_W;
      ctx.fillStyle = BLACK;
      ctx.globalAlpha = 0.5;
      ctx.fillRect(leftX1, jujuY1, leftX2 - leftX1, jujuY2 - jujuY1);
      const rightX1 = LABEL_SIZE + colIdx(7) * CELL_W;
      const rightX2 = LABEL_SIZE + colIdx(11) * CELL_W;
      ctx.fillStyle = RED;
      ctx.fillRect(rightX1, jujuY1, rightX2 - rightX1, jujuY2 - jujuY1);
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = '#f0e1c7';
      ctx.font = `bold ${CELL_W*0.35}px 'KaiTi'`;
      ctx.fillText('巨将', leftX1 + CELL_W*0.8, jujuY1 + CELL_H*1.2);
      ctx.fillText('巨将', rightX1 + CELL_W*0.8, jujuY1 + CELL_H*1.2);

      // 绘制棋子
      board.forEach((row, rIdx) => {
        row.forEach((piece, cIdx) => {
          if (!piece) return;
          const x = LABEL_SIZE + cIdx * CELL_W + CELL_W/2;
          const y = LABEL_SIZE + rIdx * CELL_H + CELL_H/2;
          const radius = CELL_W * 0.38;
          ctx.shadowColor = '#2a1e0f';
          ctx.shadowBlur = 6;
          ctx.shadowOffsetY = 2;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, 2*Math.PI);
          ctx.fillStyle = piece.color === RED ? RED : BLACK;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.lineWidth = 2.2;
          ctx.strokeStyle = '#ffe0b5';
          ctx.stroke();
          ctx.font = `bold ${radius*0.85}px 'KaiTi', 'Noto Serif SC'`;
          ctx.fillStyle = '#fef9f0';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(piece.name, x, y-1);
        });
      });

      // 日月卫、交涉 (半行绘制)
      const riverTopY = LABEL_SIZE + rowIdx(6) * CELL_H - CELL_H/2;
      const riverBottomY = LABEL_SIZE + rowIdx(8) * CELL_H - CELL_H/2;
      ctx.font = `bold ${CELL_W*0.45}px 'KaiTi'`;
      ctx.fillStyle = BLACK;
      ctx.fillText('日', LABEL_SIZE + colIdx(4)*CELL_W+CELL_W/2, riverTopY);
      ctx.fillText('卫', LABEL_SIZE + colIdx(5)*CELL_W+CELL_W/2, riverTopY);
      ctx.fillText('月', LABEL_SIZE + colIdx(7)*CELL_W+CELL_W/2, riverTopY);
      ctx.fillStyle = RED;
      ctx.fillText('月', LABEL_SIZE + colIdx(4)*CELL_W+CELL_W/2, riverBottomY);
      ctx.fillText('卫', LABEL_SIZE + colIdx(5)*CELL_W+CELL_W/2, riverBottomY);
      ctx.fillText('日', LABEL_SIZE + colIdx(7)*CELL_W+CELL_W/2, riverBottomY);
      ctx.fillStyle = BLACK;
      ctx.fillText('交', LABEL_SIZE + colIdx(1)*CELL_W+CELL_W/2, riverTopY);
      ctx.fillStyle = RED;
      ctx.fillText('涉', LABEL_SIZE + colIdx(1)*CELL_W+CELL_W/2, riverBottomY);

      // 行列标签
      ctx.font = `bold ${LABEL_SIZE*0.5}px 'Segoe UI', 'KaiTi'`;
      ctx.fillStyle = LABEL_COLOR;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let r = 0; r < ROWS; r++) {
        const logicR = logicRow(r);
        ctx.fillText(logicR, LABEL_SIZE/2, LABEL_SIZE + r*CELL_H + CELL_H/2);
      }
      for (let c = 0; c < COLS; c++) {
        const logicC = logicCol(c);
        ctx.fillText(logicC, LABEL_SIZE + c*CELL_W + CELL_W/2, canvas.height - LABEL_SIZE/2);
      }
    }

    drawBoard();
  })();
</script>
